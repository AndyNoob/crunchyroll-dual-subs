name: Deploy this extension

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # courtesy of https://stackoverflow.com/a/71158878
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  do-setup:
    name: Grab all the stuff we need
    runs-on: ubuntu-latest
    steps:
      - name: Checkout it out
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build it
        run: npm run build

      - name: Grab project version
        id: version
        run: echo "version=$(npm pkg get version --workspaces=false | jq -r .)" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        name: Upload the extension archive
        with:
          path: 'dist-zip/cr-dual-subs.zip'
          # apparently you can't have duplicated names
          name: "cr-dual-subs-${{ steps.version.outputs.version }}.zip"
          if-no-files-found: 'error'

      - name: Git archive dat thing
        run: git archive --format=zip --output=./cr-dual-subs-src.zip HEAD

      - uses: actions/upload-artifact@v7
        name: Upload the src archive
        with:
          path: 'cr-dual-subs-src.zip'
          # apparently you can't have duplicated names
          name: "cr-dual-subs-src-${{ steps.version.outputs.version }}.zip"
          if-no-files-found: 'error'

      - name: Get last successful deploy commit
        id: last_success
        uses: PatrikValkovic/last-successful-commit-action@v3.1
        with:
          workflow_id: deploy.yml
          branch: ${{ env.BRANCH_NAME }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # courtesy of GPT-5.3 (or .2?)
      - name: Generate release notes
        id: notes
        run: |
          {
            echo -n "markdown<<EOF"
            echo "# ${{ steps.version.outputs.version }}"
            git log ${{ steps.last_success.outputs.commit_hash }}..HEAD \
              --pretty=format:'- %s'
            echo
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # apply the github-action bot email and username
      - uses: qoomon/actions--setup-git@v1
        with:
          user: bot

      - name: Prepend the CHANGELOG.md file
        # courtesy of https://stackoverflow.com/a/27950358
        run: |
          printf '%s\n\n%s\n' "${{ steps.notes.outputs.markdown }}" "$(cat CHANGELOG.md)" > CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "Update changelog for ${{ steps.version.outputs.version }}"
          git push
    outputs:
      notes: ${{ steps.notes.outputs.markdown }}
      version: ${{ steps.version.outputs.version }}

  deploy-firefox:
    name: Deploy addon to firefox
    runs-on: ubuntu-latest
    needs: do-setup
    steps:
      - uses: actions/download-artifact@v8
        name: Download the built stuff
        with:
          path: .

      - uses: browser-actions/release-firefox-addon@latest
        name: Release it to firefox
        with:
          addon-id: 'cr-dual-sub@andynoob'
          addon-path: 'cr-dual-subs.zip'
          source-path: 'cr-dual-subs-src.zip'
          auth-api-issuer: ${{ secrets.AMO_ISSUER }}
          auth-api-secret: ${{ secrets.AMO_SECRET }}
          approval-note: |
            The steps to build project is in README.md.
          release-note: ${{ needs.do-setup.outputs.notes }}

  deploy-github:
    name: Release it on Github
    runs-on: ubuntu-latest
    needs: do-setup
    steps:
      - uses: actions/download-artifact@v8
        name: Download the built stuff
        with:
          path: .

      - uses: ncipollo/release-action@v1
        name: Release it on Github
        with:
          artifacts: 'cr-sub-subs.zip'
          body: ${{ needs.do-setup.outputs.notes }}
          commit: ${{ env.BRANCH_NAME }}
          tag: "v${{ needs.do-setup.outputs.version }}"
          allowUpdates: true