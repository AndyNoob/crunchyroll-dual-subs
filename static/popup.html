<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Change extension settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div id="loading-state">Loading settings...</div>
    <main id="cr-dual-subs-options" hidden>
<!--        <h1>Crunchyroll Dual Subs</h1>-->
        <div class="profile-display">
            <span>Profile</span>
            <span id="profile-select"></span>
        </div>

        <div class="scope-block">
            <label>
                Applies to
                <select id="scope-select">
                    <option value="global">Global (overridden by season)</option>
                    <option value="season">Current Season (overridden by episode)</option>
                    <option value="episode">Current Episode</option>
                </select>
            </label>

            <div class="settings-block">
                <label>
                    Preferred secondary subtitle
                    <select id="subtitle-select"></select>
                </label>

                <div class="field">
                    <label for="offset-input">Subtitle time offset</label>
                    <div class="inline-field">
                        <input id="offset-input" type="number" step="0.05" value="0" />
                        <span>seconds</span>
                    </div>
                </div>

                <button id="reset-position-button">Reset subtitle position</button>

<!--                <label class="checkbox-row">-->
<!--                    <input id="debug-logs-checkbox" type="checkbox" />-->
<!--                    Enable debug logs-->
<!--                </label>-->
            </div>
        </div>
        <footer>
            <a href="https://github.com/AndyNoob/crunchyroll-dual-subs/" target="_blank">SOURCE ↗</a>
            <span>|</span>
            <a href="https://github.com/AndyNoob/crunchyroll-dual-subs/issues" target="_blank">ISSUES ↗</a>
        </footer>
    </main>
    <script src="../src/popup.ts" type="module"></script>
</body>

</html>
